packages: ["packages/*", "apps/*", "qa/**"]
allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  "@swc/core": true
  core-js: true
  core-js-pure: true
  esbuild: true
  lefthook: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

minimumReleaseAge: 4320
resolutionMode: highest
minimumReleaseAgeExclude:
  - "@notum-cz/strapi-plugin-smart-populate@1.0.1"
  - "nodemailer@9.0.1"

overrides:
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  # Strapi's admin renders `json` fields (e.g. Page > seo > structuredData) with
  # CodeMirror. The packageExtensions below mark its peers optional, so pnpm
  # installs two copies and `instanceof` checks fail with
  # "Unrecognized extension value in extension set". Pin one version of each.
  "@codemirror/state": 6.6.0
  "@codemirror/view": 6.43.1
  "@codemirror/language": 6.12.3

packageExtensions:
  "@hookform/resolvers":
    peerDependencies:
      zod: "*"
  "@uiw/codemirror-extensions-basic-setup":
    peerDependenciesMeta:
      "@codemirror/autocomplete":
        optional: true
      "@codemirror/language":
        optional: true
      "@codemirror/lint":
        optional: true
      "@codemirror/search":
        optional: true
      "@codemirror/state":
        optional: true
      "@codemirror/view":
        optional: true
  "@uiw/react-codemirror":
    peerDependenciesMeta:
      "@babel/runtime":
        optional: true
      "@codemirror/state":
        optional: true
      "@codemirror/theme-one-dark":
        optional: true
      "@codemirror/view":
        optional: true
      codemirror:
        optional: true

peerDependencyRules:
  allowedVersions:
    eslint: ^9.39.0
    react: ">=18 <20"
    react-dom: ">=18 <20"
    styled-components: ">=6.0.0 <7"
    typescript: ">=5.4.0 <6"
    zod: ">=3.25.67 <5"
