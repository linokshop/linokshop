<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700;800&family=Oswald:wght@400;500;600;700&family=Golos+Text:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  a { text-decoration: none; }
  .hdr-burger { display:none; }
  @media (max-width:900px){
    .hdr-nav { display:none !important; }
    .hdr-burger { display:flex !important; }
    .hdr-strip-txt { font-size:11px !important; }
    .hdr-bar { padding:12px 18px !important; }
    .hdr-strip { padding:9px 16px !important; }
  }
  @media (max-width:600px){
    .hdr-strip-long { display:none !important; }
    .hdr-lang { display:none !important; }
    .hdr-logo-sub { display:none !important; }
    .hdr-logo-name { font-size:21px !important; }
  }
</style>
</helmet>
<div style="font-family:'Golos Text',sans-serif;">
  <!-- top strip -->
  <a href="veteran.dc.html" class="hdr-strip" style="display:flex; align-items:center; justify-content:center; gap:10px; background:#103450; color:#fff; font-family:'Oswald',sans-serif; font-size:13.5px; letter-spacing:.04em; text-transform:uppercase; padding:10px 40px; text-align:center;">
    <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#ef8a1f; flex:none;"></span>
    <span class="hdr-strip-txt hdr-strip-long">Державна програма «Ветеранський спорт» — підтримка ветеранів через «Дія»</span>
    <span class="hdr-strip-txt" style="color:#ef8a1f; font-weight:600;">Дізнатися →</span>
  </a>

  <!-- header bar -->
  <div class="hdr-bar" style="display:flex; align-items:center; justify-content:space-between; padding:16px 40px; background:#102619; border-bottom:1px solid #25422f;">
    <a href="index.dc.html" style="display:flex; align-items:center; gap:13px;">
      <img src="assets/logo.jpg" alt="ЛінОк" style="width:50px; height:50px; border-radius:50%; object-fit:cover; flex:none;">
      <span style="display:flex; flex-direction:column; line-height:1;">
        <span class="hdr-logo-name" style="font-family:'Oswald',sans-serif; font-weight:600; font-size:25px; color:#f1efe2; letter-spacing:.02em;">ЛінОк</span>
        <span class="hdr-logo-sub" style="font-family:'Oswald',sans-serif; font-size:10.5px; color:#7e9a85; letter-spacing:.16em; text-transform:uppercase; margin-top:4px;">Рибальський магазин</span>
      </span>
    </a>

    <div class="hdr-nav" style="display:flex; align-items:center; gap:24px;">
      <sc-for list="{{navItems}}" as="item" hint-placeholder-count="6">
        <a href="{{item.href}}" style="position:relative; font-family:'Oswald',sans-serif; font-size:14px; text-transform:uppercase; letter-spacing:.05em; color:#cbd2c4; padding:4px 0;">
          {{item.label}}
          <sc-if value="{{item.active}}" hint-placeholder-val="{{ false }}">
            <span style="position:absolute; left:0; right:0; bottom:-6px; height:2px; background:#ef8a1f;"></span>
          </sc-if>
        </a>
      </sc-for>
      <a href="veteran.dc.html" style="font-family:'Oswald',sans-serif; font-size:14px; text-transform:uppercase; letter-spacing:.05em; color:#ef8a1f; font-weight:500;">Ветеранам</a>
    </div>

    <div style="display:flex; align-items:center; gap:16px;">
      <span class="hdr-lang" style="font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:.04em; color:#a9ad96;"><b style="color:#fff;">UA</b> / RU</span>
      <a href="cart.dc.html" style="display:inline-flex; align-items:center; gap:8px; padding:10px 18px; background:#bf7a33; border-radius:4px; font-family:'Oswald',sans-serif; font-size:14px; font-weight:500; text-transform:uppercase; letter-spacing:.04em; color:#fff; flex:none;">Кошик · 2</a>
      <button class="hdr-burger" onClick="{{ toggle }}" aria-label="Меню" style="flex-direction:column; justify-content:center; gap:5px; width:44px; height:44px; align-items:center; background:#15301f; border:1px solid #2f4f3a; border-radius:8px; cursor:pointer; padding:0;">
        <span style="display:block; width:20px; height:2px; background:#e7e5d2;"></span>
        <span style="display:block; width:20px; height:2px; background:#e7e5d2;"></span>
        <span style="display:block; width:20px; height:2px; background:#e7e5d2;"></span>
      </button>
    </div>
  </div>

  <!-- mobile menu -->
  <div style="display:{{ menuDisplay }}; background:#102619; border-bottom:1px solid #25422f; padding:8px 18px 18px;">
    <sc-for list="{{navItems}}" as="item" hint-placeholder-count="6">
      <a href="{{item.href}}" style="display:block; font-family:'Oswald',sans-serif; font-size:16px; text-transform:uppercase; letter-spacing:.04em; color:{{item.color}}; padding:13px 4px; border-bottom:1px solid #1c3627;">{{item.label}}</a>
    </sc-for>
    <a href="veteran.dc.html" style="display:block; font-family:'Oswald',sans-serif; font-size:16px; text-transform:uppercase; letter-spacing:.04em; color:#ef8a1f; font-weight:600; padding:13px 4px;">Ветеранам</a>
    <div style="font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:.04em; color:#a9ad96; padding:10px 4px 0;"><b style="color:#fff;">UA</b> / RU</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:160},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;index&quot;,&quot;catalog&quot;,&quot;product&quot;,&quot;cart&quot;,&quot;veteran&quot;,&quot;about&quot;,&quot;delivery&quot;,&quot;contacts&quot;,&quot;promos&quot;],&quot;default&quot;:&quot;index&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { open: false };
  renderVals() {
    const active = this.props.active || 'index';
    const defs = [
      ['Головна', 'index.dc.html', 'index'],
      ['Каталог', 'catalog.dc.html', 'catalog'],
      ['Акції', 'promos.dc.html', 'promos'],
      ['Про магазин', 'about.dc.html', 'about'],
      ['Доставка', 'delivery.dc.html', 'delivery'],
      ['Контакти', 'contacts.dc.html', 'contacts'],
    ];
    return {
      navItems: defs.map(([label, href, key]) => ({ label, href, active: active === key, color: active === key ? '#ef8a1f' : '#cbd2c4' })),
      menuDisplay: this.state.open ? 'block' : 'none',
      toggle: () => this.setState(s => ({ open: !s.open })),
    };
  }
}
</script>
</body>
</html>
